<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday น้องฝ้าย 🧁</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Tahoma;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    overflow:hidden;
    height:100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1{ font-size:6vw; color:#ff4d88; margin-bottom: 10px; z-index: 5;}
p{ font-size:3vw; color:#ff4d88; z-index: 5;}

.cupcake-wrapper {
    position: relative;
    display: inline-block;
    cursor: pointer;
    margin-top: 80px;
    z-index: 10;
}

.cupcake { font-size: 25vw; line-height: 1; }

.numbers {
    position: absolute;
    top: -10vw;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    font-size: 12vw;
    font-weight: bold;
    color: #ff4d88;
    text-shadow: 2px 2px 0px #fff;
}

.flame {
    position: absolute;
    top: -6vw;
    left: 50%;
    transform: translateX(-50%);
    font-size: 6vw;
    animation: flicker 0.5s infinite alternate;
}

@keyframes flicker {
    from { opacity: 0.8; transform: translateX(-50%) scale(1); }
    to { opacity: 1; transform: translateX(-50%) scale(1.1); }
}

/* popup คำอวยพร */
.popup{
    position:absolute;
    background:#ffc9dd;
    padding:20px 35px;
    border-radius:25px;
    font-size:2.5vw;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
    animation:pop 0.3s ease;
    z-index: 100;
}

@keyframes pop{ from{transform:scale(0.7);} to{transform:scale(1);} }

/* หัวใจแบบพลุ */
.heart {
    position: absolute;
    pointer-events: none;
    z-index: 999;
    /* อนิเมชั่นระเบิดออกและจางหาย */
    animation: explode 3s ease-out forwards;
}

@keyframes explode {
    0% {
        transform: translate(0, 0) scale(0);
        opacity: 1;
    }
    100% {
        /* ใช้ตัวแปรจาก JS ในการเคลื่อนที่ */
        transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(1.5);
        opacity: 0;
    }
}

.swal2-confirm { background-color: #ff4d88 !important; }
.swal2-deny { background-color: #ff66a3 !important; }
</style>
</head>

<body>

<h1>Happy Birthday น้องฝ้าย 🐽</h1>
<p id="hintText">กดที่เค้กสิ</p>

<div class="cupcake-wrapper" onclick="cakeClick()">
    <div class="numbers">
        <div class="num-item" style="position:relative;">
            <span class="flame">🔥</span>
            2
        </div>
        <div class="num-item" style="position:relative;">
            <span class="flame">🔥</span>
            1
        </div>
    </div>
    <div class="cupcake">🧁</div>
</div>

<script>
window.onload = function() {
    Swal.fire({
        title: 'วันนี้วันเกิดใครน้าาา? 🧁✨',
        icon: 'question',
        showDenyButton: true,
        confirmButtonText: 'น้องฝ้ายแฟนแพรวา',
        denyButtonText: 'หมูฝ้ายแฟนแพรวา',
        allowOutsideClick: false,
        background: '#fff',
        color: '#ff4d88'
    }).then((result) => {
        if (result.isConfirmed || result.isDenied) {
            Swal.fire({
                title: 'ถูกต้องที่สุด! 🎉',
                icon: 'success',
                showConfirmButton: false,
                timer: 1500,
                background: '#fff',
                color: '#ff4d88'
            });
        }
    });
};

let clickCount = 0
let candleOut = false

const popupPositions = [
    {side:"left", top:"25%"},
    {side:"right", top:"50%"},
    {side:"left", top:"75%"}
]

function showPopup(text){
    const pos = popupPositions[clickCount-1]
    const popup=document.createElement("div")
    popup.className="popup"
    popup.innerText=text
    popup.style.top = pos.top
    if(pos.side==="left"){ popup.style.left="10%" }
    else{ popup.style.right="10%" }
    document.body.appendChild(popup)
    setTimeout(()=>{ popup.remove() }, 2300)
}

function createHearts(){
    const amount = 150; // จำนวนหัวใจที่ระเบิดออก
    const container = document.body;

    for(let i=0; i<amount; i++){
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = ["💖", "💗", "💓", "💝", "✨"][Math.floor(Math.random() * 5)];
        
        // จุดเริ่มต้นอยู่ที่ตัวเค้ก (กลางจอ)
        heart.style.left = "50%";
        heart.style.top = "55%";

        // คำนวณมุมและระยะทางแบบวงกลม (พลุ)
        const angle = Math.random() * Math.PI * 2; // สุ่มมุม 360 องศา
        const velocity = Math.random() * 100 + 50; // ความแรงในการพุ่ง
        
        // แปลงมุมเป็นพิกัด X และ Y (พุ่งกระจายเต็มจอ)
        const tx = Math.cos(angle) * velocity + "vw";
        const ty = Math.sin(angle) * velocity + "vh";
        const tr = (Math.random() * 360) + "deg"; // หมุนตัวหัวใจ

        heart.style.setProperty('--tx', tx);
        heart.style.setProperty('--ty', ty);
        heart.style.setProperty('--tr', tr);
        
        heart.style.fontSize = (Math.random() * 30 + 15) + "px";

        container.appendChild(heart);
        
        // ลบออกเมื่อจบอนิเมชั่น
        setTimeout(() => { heart.remove(); }, 3000);
    }
}

function cakeClick(){
    if(candleOut) return
    clickCount++

    if(clickCount===1){ showPopup("รักหมูฝ้ายที่สุดในโลก") }
    else if(clickCount===2){ showPopup("ขอให้สุขภาพแข็งแรง") }
    else if(clickCount===3){ showPopup("ขอให้รวยๆแล้วมาเลี้ยงเค้า ><") }
    else if(clickCount===4){
        const flames = document.querySelectorAll(".flame");
        flames.forEach(f => f.style.display = "none");
        
        document.getElementById("hintText").innerHTML = "<b>เป่าเทียนดับแล้ว! มีความสุขมากๆ นะคะ 🎉</b>";
        
        candleOut = true;
        createHearts(); // เรียกฟังก์ชันระเบิดพลุหัวใจ
    }
}
</script>

</body>
</html>
