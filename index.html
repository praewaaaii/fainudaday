<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday น้องฝ้าย 🧁</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Tahoma;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    overflow:hidden;
    height:100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1{ font-size:6vw; color:#ff4d88; margin-bottom: 10px; }
p{ font-size:3vw; color:#ff4d88; }

.cupcake-wrapper {
    position: relative;
    display: inline-block;
    cursor: pointer;
    margin-top: 80px;
}

.cupcake { font-size: 25vw; line-height: 1; }

.numbers {
    position: absolute;
    top: -10vw;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    font-size: 12vw;
    font-weight: bold;
    color: #ff4d88;
    text-shadow: 2px 2px 0px #fff;
}

.num-item { position: relative; }

.flame {
    position: absolute;
    top: -6vw;
    left: 50%;
    transform: translateX(-50%);
    font-size: 6vw;
    animation: flicker 0.5s infinite alternate;
}

@keyframes flicker {
    from { opacity: 0.8; transform: translateX(-50%) scale(1); }
    to { opacity: 1; transform: translateX(-50%) scale(1.1); }
}

.popup{
    position:absolute;
    background:#ffc9dd;
    padding:20px 35px;
    border-radius:25px;
    font-size:2.5vw;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
    animation:pop 0.3s ease;
    z-index: 100;
}

@keyframes pop{ from{transform:scale(0.7);} to{transform:scale(1);} }

.heart{
    position:absolute;
    pointer-events:none;
    z-index: 999;
    animation:float 4s linear forwards;
}

@keyframes float{
    0%{ transform:translate(0,0) scale(1); opacity:1; }
    100%{ transform:translate(var(--x), -120vh) scale(1.4); opacity:0; }
}

/* ตกแต่งสีปุ่ม Choice */
.swal2-confirm { background-color: #ff4d88 !important; }
.swal2-deny { background-color: #ff66a3 !important; }
</style>
</head>

<body>

<h1>Happy Birthday น้องฝ้าย 🐽</h1>
<p id="hintText">กดที่คัพเค้กสิ</p>

<div class="cupcake-wrapper" onclick="cakeClick()">
    <div class="numbers">
        <div class="num-item">
            <span class="flame">🔥</span>
            2
        </div>
        <div class="num-item">
            <span class="flame">🔥</span>
            1
        </div>
    </div>
    <div class="cupcake">🧁</div>
</div>

<script>
window.onload = function() {
    // หน้าเลือก Choice
    Swal.fire({
        title: 'วันนี้วันเกิดใครน้าาา?',
        icon: 'question',
        showDenyButton: true,
        confirmButtonText: 'น้องฝ้ายแฟนแพรวา 💖',
        denyButtonText: 'หมูฝ้ายแฟนแพรวา 🐽',
        allowOutsideClick: false,
        background: '#fff',
        color: '#ff4d88'
    }).then((result) => {
        if (result.isConfirmed || result.isDenied) {
            // หน้า "ถูกต้องที่สุด" แบบไม่ต้องกด (เด้งแล้วหายเองใน 1.5 วินาที)
            Swal.fire({
                title: 'ถูกต้องที่สุด! 🎉',
                icon: 'success',
                showConfirmButton: false, // เอาปุ่มออก
                timer: 1500, // แสดงแค่ 1.5 วินาทีแล้วปิดเอง
                background: '#fff',
                color: '#ff4d88'
            });
        }
    });
};

let clickCount = 0
let candleOut = false

const popupPositions = [
    {side:"left", top:"25%"},
    {side:"right", top:"50%"},
    {side:"left", top:"75%"}
]

function showPopup(text){
    const pos = popupPositions[clickCount-1]
    const popup=document.createElement("div")
    popup.className="popup"
    popup.innerText=text
    popup.style.top = pos.top
    if(pos.side==="left"){ popup.style.left="10%" }
    else{ popup.style.right="10%" }
    document.body.appendChild(popup)
    setTimeout(()=>{ popup.remove() }, 2300)
}

function createHearts(){
    for(let i=0;i<150;i++){
        const heart=document.createElement("div")
        heart.className="heart"
        heart.innerHTML="💖"
        heart.style.left=Math.random()*100+"vw"
        heart.style.bottom="-20px"
        heart.style.fontSize=(20+Math.random()*40)+"px"
        let randomX=(Math.random()*200-100)+"vw"
        heart.style.setProperty("--x",randomX)
        document.body.appendChild(heart)
        setTimeout(()=>{ heart.remove() },4000)
    }
}

function cakeClick(){
    if(candleOut) return
    clickCount++

    if(clickCount===1){ showPopup("แพรวารักฝ้ายที่สุดในโลก") }
    else if(clickCount===2){ showPopup("ขอให้เธอสุขภาพแข็งแรง") }
    else if(clickCount===3){ showPopup("ขอให้รวยๆแล้วมาเลี้ยงเค้า ><") }
    else if(clickCount===4){
        const flames = document.querySelectorAll(".flame");
        flames.forEach(f => f.style.display = "none");
        document.getElementById("hintText").innerText = "เป่าเทียนดับแล้ว! มีความสุขมากๆ นะที่รัก"
        candleOut=true
        createHearts()
    }
}
</script>

</body>
</html>
