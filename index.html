<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday น้องฝ้าย</title>

<style>

body{
margin:0;
text-align:center;
font-family:Tahoma;
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
overflow:hidden;
height:100vh;
}

h1{
margin-top:60px;
font-size:6vw;
color:#ff4d88;
}

p{
font-size:3vw;
color:#ff4d88;
}

.cake{
font-size:25vw;
cursor:pointer;
margin-top:20px;
}

.flame{
font-size:8vw;
}

/* popup */

.popup{
position:absolute;
top:60%;
background:#ffc9dd;
padding:20px 35px;
border-radius:25px;
font-size:2.5vw;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0.7);}
to{transform:scale(1);}
}

/* hearts */

.heart{
position:absolute;
font-size:35px;
animation:float 4s linear forwards;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Happy Birthday น้องฝ้าย 🐽</h1>
<p>กดที่เค้กสิ</p>

<div class="cake" onclick="cakeClick()">
🎂 <span id="flame" class="flame">🔥</span>
</div>

<script>

let clickCount = 0;
let candleOut = false;

function showPopup(text){

const popup = document.createElement("div");
popup.className="popup";
popup.innerText=text;

/* สลับซ้ายขวา */

if(clickCount % 2 === 1){
popup.style.left="15%";
}else{
popup.style.right="15%";
}

document.body.appendChild(popup);

setTimeout(()=>{
popup.remove();
},2200);

}

function createHearts(){

for(let i=0;i<80;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.bottom="-20px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

}

}

function cakeClick(){

if(candleOut) return;

clickCount++;

if(clickCount===1){
showPopup("รักหมูฝ้ายที่สุดในโลก 💖");
}

else if(clickCount===2){
showPopup("ขอให้สุขภาพแข็งแรง ✨");
}

else if(clickCount===3){
showPopup("ขอให้รวยๆแล้วมาเลี้ยงเค้า >< 💸");
}

else if(clickCount===4){

document.getElementById("flame").style.display="none";

candleOut=true;

createHearts();

}

}

</script>

</body>
</html>
