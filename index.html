<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday น้องฝ้าย 🧁</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
    margin:0;
    text-align:center;
    font-family:Tahoma;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    overflow:hidden;
    height:100vh;
    display: flex;
    flex-direction: column;
    /* แบ่งพื้นที่ให้หัวข้ออยู่บน เค้กอยู่ล่าง */
    justify-content: space-between; 
    padding: 40px 0; /* เว้นขอบบนล่าง */
    box-sizing: border-box;
}

.header-area {
    margin-top: 20px;
    z-index: 5;
}

h1{ font-size: 6vw; color:#ff4d88; margin: 0; }
p{ font-size: 3vw; color:#ff4d88; margin-top: 10px; }

/* ส่วนของคัพเค้กและตัวเลข ปรับให้อยู่ด้านล่าง */
.cupcake-wrapper {
    position: relative;
    display: inline-block;
    cursor: pointer;
    margin-bottom: 20px; /* ดันขึ้นจากขอบล่างนิดหน่อย */
    z-index: 10;
}

.cupcake { 
    font-size: 22vw; /* ลดขนาดลงนิดนึงเพื่อให้พอดี iPad */
    line-height: 1; 
}

.numbers {
    position: absolute;
    top: -10vw; /* ระยะห่างจากคัพเค้ก */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    font-size: 10vw;
    font-weight: bold;
    color: #ff4d88;
    text-shadow: 2px 2px 0px #fff;
}

.flame {
    position: absolute;
    top: -6vw;
    left: 50%;
    transform: translateX(-50%);
    font-size: 6vw;
    animation: flicker 0.5s infinite alternate;
}

@keyframes flicker {
    from { opacity: 0.8; transform: translateX(-50%) scale(1); }
    to { opacity: 1; transform: translateX(-50%) scale(1.1); }
}

/* popup คำอวยพร */
.popup{
    position:absolute;
    background:#ffc9dd;
    padding:20px 35px;
    border-radius:25px;
    font-size:2.5vw;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
    animation:pop 0.3s ease;
    z-index: 100;
}

@keyframes pop{ from{transform:scale(0.7);} to{transform:scale(1);} }

.heart {
    position: absolute;
    pointer-events: none;
    z-index: 999;
    animation: explode 3s ease-out forwards;
}

@keyframes explode {
    0% { transform: translate(0, 0) scale(0); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(1.5); opacity: 0; }
}

.swal2-confirm { background-color: #ff4d88 !important; }
.swal2-deny { background-color: #ff66a3 !important; }
</style>
</head>

<body>

    <div class="header-area">
        <h1>Happy Birthday น้องฝ้าย 🐽</h1>
        <p id="hintText">กดที่คัพเค้กสิ</p>
    </div>

    <div class="cupcake-wrapper" onclick="cakeClick()">
        <div class="numbers">
            <div class="num-item" style="position:relative;">
                <span class="flame">🔥</span>
                2
            </div>
            <div class="num-item" style="position:relative;">
                <span class="flame">🔥</span>
                1
            </div>
        </div>
        <div class="cupcake">🧁</div>
    </div>

<script>
window.onload = function() {
    Swal.fire({
        title: 'วันนี้วันเกิดใครน้าาา? 🧁✨',
        text: 'เลือกให้ถูกคนนะเจ้าของวันเกิดน่ะ!',
        icon: 'question',
        showDenyButton: true,
        confirmButtonText: 'น้องฝ้ายแฟนแพรวา 💖',
        denyButtonText: 'หมูฝ้ายแฟนแพรวา 🐽',
        allowOutsideClick: false,
        background: '#fff',
        color: '#ff4d88'
    }).then((result) => {
        if (result.isConfirmed || result.isDenied) {
            Swal.fire({
                title: 'ถูกต้องที่สุด! 🎉',
                icon: 'success',
                showConfirmButton: false,
                timer: 1500,
                background: '#fff',
                color: '#ff4d88'
            });
        }
    });
};

let clickCount = 0
let candleOut = false

const popupPositions = [
    {side:"left", top:"20%"},
    {side:"right", top:"40%"},
    {side:"left", top:"60%"}
]

function showPopup(text){
    const pos = popupPositions[clickCount-1]
    const popup=document.createElement("div")
    popup.className="popup"
    popup.innerText=text
    popup.style.top = pos.top
    if(pos.side==="left"){ popup.style.left="10%" }
    else{ popup.style.right="10%" }
    document.body.appendChild(popup)
    setTimeout(()=>{ popup.remove() }, 2300)
}

function createHearts(){
    const amount = 150;
    const container = document.body;
    for(let i=0; i<amount; i++){
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = ["💖", "💗", "💓", "💝", "✨"][Math.floor(Math.random() * 5)];
        heart.style.left = "50%";
        heart.style.top = "75%"; // ระเบิดจากตำแหน่งคัพเค้กใหม่

        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 100 + 50;
        const tx = Math.cos(angle) * velocity + "vw";
        const ty = Math.sin(angle) * velocity + "vh";
        const tr = (Math.random() * 360) + "deg";

        heart.style.setProperty('--tx', tx);
        heart.style.setProperty('--ty', ty);
        heart.style.setProperty('--tr', tr);
        heart.style.fontSize = (Math.random() * 30 + 15) + "px";
        container.appendChild(heart);
        setTimeout(() => { heart.remove(); }, 3000);
    }
}

function cakeClick(){
    if(candleOut) return
    clickCount++

    if(clickCount===1){ showPopup("รักหมูฝ้ายที่สุดในโลก 💖") }
    else if(clickCount===2){ showPopup("ขอให้สุขภาพแข็งแรง ✨") }
    else if(clickCount===3){ showPopup("ขอให้รวยๆแล้วมาเลี้ยงเค้า >< 💸") }
    else if(clickCount===4){
        const flames = document.querySelectorAll(".flame");
        flames.forEach(f => f.style.display = "none");
        document.getElementById("hintText").innerHTML = "<b>เป่าเทียนดับแล้ว! มีความสุขมากๆ นะคะ 🎉</b>";
        candleOut = true;
        createHearts();
    }
}
</script>

</body>
</html>
