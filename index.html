<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday น้องฝ้าย 🐽</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #ffd6e7, #ffeef5);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 8vw;
            color: #ff4d88;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p {
            font-size: 4vw;
            color: #ff66a3;
            margin-bottom: 30px;
        }

        /* Cake Container */
        .cake-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cake-container:active {
            transform: scale(0.95);
        }

        .cake-emoji {
            font-size: 30vw;
            line-height: 1;
        }

        .flame {
            position: absolute;
            top: 2vw; /* ปรับตำแหน่งให้วางบนเทียนพอดี */
            left: 50%;
            transform: translateX(-50%);
            font-size: 8vw;
            animation: flicker 0.5s infinite alternate;
        }

        @keyframes flicker {
            from { opacity: 0.8; transform: translateX(-50%) scale(1); }
            to { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* Wishes Popups */
        .wish-popup {
            position: absolute;
            background: #ffffff;
            color: #ff4d88;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 4vw;
            box-shadow: 0 8px 20px rgba(255, 77, 136, 0.3);
            white-space: nowrap;
            z-index: 10;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Hearts */
        .heart {
            position: absolute;
            pointer-events: none;
            z-index: 99;
            animation: fly 4s ease-out forwards;
        }

        @keyframes fly {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>Happy Birthday น้องฝ้าย 🐽</h1>
    <p id="hint">จิ้มที่เค้กเพื่อรับคำอวยพรนะ!</p>

    <div class="cake-container" onclick="handleCakeClick()">
        <span id="flame" class="flame">🔥</span>
        <div class="cake-emoji">🎂</div>
    </div>

    <script>
        // 1. เด้ง Popup ทันทีที่โหลดหน้าเสร็จ
        window.onload = () => {
            Swal.fire({
                title: 'HBD นะคะน้องฝ้าย! 🎂✨',
                text: 'วันนี้วันเกิดใครน้าาา มีของขวัญมาให้ในเค้กด้วยนะ ลองเปิดดูสิ!',
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/3132/3132715.png',
                imageWidth: 100,
                confirmButtonText: 'ไปดูเลย! 💖',
                confirmButtonColor: '#ff4d88',
                backdrop: `rgba(255, 182, 193, 0.4)`
            });
        };

        let clickCount = 0;
        let isBlownOut = false;

        const wishes = [
            { text: "รักหมูฝ้ายที่สุดในโลก 💖", top: '20%', left: '10%' },
            { text: "ขอให้สุขภาพแข็งแรง ✨", top: '50%', right: '5%' },
            { text: "ขอให้รวยๆ แล้วมาเลี้ยงเค้า 💸", top: '75%', left: '15%' }
        ];

        function handleCakeClick() {
            if (isBlownOut) return;

            if (clickCount < 3) {
                showWish(wishes[clickCount]);
                clickCount++;
            } else {
                blowOutCandle();
            }
        }

        function showWish(wishData) {
            const wish = document.createElement("div");
            wish.className = "wish-popup";
            wish.innerText = wishData.text;
            
            // กำหนดตำแหน่งตาม Config
            if(wishData.left) wish.style.left = wishData.left;
            if(wishData.right) wish.style.right = wishData.right;
            wish.style.top = wishData.top;

            document.body.appendChild(wish);
        }

        function blowOutCandle() {
            isBlownOut = true;
            
            // ดับไฟ
            document.getElementById("flame").style.display = "none";
            document.getElementById("hint").innerText = "เย้! มีความสุขมากๆ นะคะ 🎉";
            
            // เปลี่ยนหัวข้อ
            document.querySelector("h1").innerText = "Love You! 💖";

            // กระจายหัวใจแบบเยอะๆๆๆ
            explodeHearts();
        }

        function explodeHearts() {
            const amount = 100; // จำนวนหัวใจ
            for (let i = 0; i < amount; i++) {
                const heart = document.createElement("div");
                heart.className = "heart";
                heart.innerHTML = ["💖", "💗", "💓", "💝", "✨", "🐷"][Math.floor(Math.random() * 6)];
                
                // จุดเริ่มต้น (กลางจอตรงเค้ก)
                heart.style.left = "50%";
                heart.style.top = "60%";
                
                // สุ่มทิศทางการกระจาย (พุ่งขึ้นและออกข้าง)
                const tx = (Math.random() - 0.5) * 200 + "vw"; // กระจายซ้ายขวา
                const ty = -(Math.random() * 120 + 20) + "vh"; // พุ่งขึ้นข้างบน
                const tr = Math.random() * 360 + "deg"; // หมุน
                
                heart.style.setProperty('--tx', tx);
                heart.style.setProperty('--ty', ty);
                heart.style.setProperty('--tr', tr);
                
                // สุ่มขนาด
                heart.style.fontSize = (Math.random() * 30 + 20) + "px";

                document.body.appendChild(heart);

                // ลบออกเมื่ออนิเมชั่นจบ
                setTimeout(() => heart.remove(), 4000);
            }
        }
    </script>
</body>
</html>
