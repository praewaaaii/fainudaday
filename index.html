<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Happy Birthday น้องฝ้าย</title>

<style>

body{
    margin:0;
    text-align:center;
    font-family:Tahoma;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    overflow:hidden;
}

h1{
    margin-top:80px;
    font-size:55px;
    color:#ff4d88;
}

p{
    font-size:26px;
    color:#ff4d88;
}

.cake{
    font-size:200px;
    cursor:pointer;
    margin-top:40px;
}

.flame{
    font-size:60px;
}

/* popup */

.popup{
    position:absolute;
    left:60%;
    top:50%;
    transform:translate(-50%,-50%);
    background:#ffc9dd;
    padding:20px 35px;
    border-radius:25px;
    font-size:22px;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

/* hearts */

.heart{
    position:absolute;
    font-size:35px;
    animation:float 3s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-800px);
        opacity:0;
    }
}

</style>
</head>

<body>

<h1>Happy Birthday น้องฝ้าย 🐽</h1>
<p>กดที่เค้กสิ</p>

<div class="cake" onclick="cakeClick()">
🎂 <span id="flame" class="flame">🔥</span>
</div>

<div id="popupContainer"></div>

<script>

let clickCount = 0;

function showPopup(text){

    const popup = document.createElement("div");
    popup.classList.add("popup");
    popup.innerText = text;

    document.getElementById("popupContainer").appendChild(popup);

    setTimeout(()=>{
        popup.remove();
    },2000);
}

function createHearts(){

    for(let i=0;i<50;i++){

        const heart=document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="💖";

        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.bottom="0px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },3000);

    }

}

function cakeClick(){

    clickCount++;

    if(clickCount==1){
        showPopup("รักหมูฝ้ายที่สุดในโลก 💖");
    }

    else if(clickCount==2){
        showPopup("ขอให้สุขภาพแข็งแรง ✨");
    }

    else if(clickCount==3){
        showPopup("ขอให้รวยๆแล้วมาเลี้ยงเค้า >< 💸");
    }

    else if(clickCount==4){

        document.getElementById("flame").innerHTML="";

        createHearts();

    }

}

</script>

</body>
</html>
