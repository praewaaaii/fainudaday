<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday น้องฝ้าย</title>

<style>

body{
margin:0;
text-align:center;
font-family:Tahoma;
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
overflow:hidden;
height:100vh;
}

h1{
margin-top:60px;
font-size:6vw;
color:#ff4d88;
}

p{
font-size:3vw;
color:#ff4d88;
}

.cake{
position:relative;
font-size:22vw;
cursor:pointer;
margin-top:40px;
}

.flame{
position:absolute;
top:-2vw;
left:50%;
transform:translateX(-50%);
font-size:6vw;
}

/* popup */

.popup{
position:absolute;
background:#ffc9dd;
padding:20px 35px;
border-radius:25px;
font-size:2.5vw;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0.7);}
to{transform:scale(1);}
}

/* hearts */

.heart{
position:absolute;
pointer-events:none;
animation:float 4s linear forwards;
}

@keyframes float{

0%{
transform:translate(0,0) scale(1);
opacity:1;
}

100%{
transform:translate(var(--x), -120vh) scale(1.4);
opacity:0;
}

}

</style>
</head>

<body>

<h1>Happy Birthday น้องฝ้าย 🐽</h1>
<p>กดที่เค้กสิ</p>

<div class="cake" onclick="cakeClick()">

<span id="flame" class="flame">🔥</span>
🎂

</div>

<script>

let clickCount = 0
let candleOut = false

const popupPositions = [
{side:"left", top:"25%"},
{side:"right", top:"50%"},
{side:"left", top:"75%"}
]

function showPopup(text){

const pos = popupPositions[clickCount-1]

const popup=document.createElement("div")
popup.className="popup"
popup.innerText=text

popup.style.top = pos.top

if(pos.side==="left"){
popup.style.left="10%"
}else{
popup.style.right="10%"
}

document.body.appendChild(popup)

setTimeout(()=>{
popup.remove()
},2300)

}

function createHearts(){

for(let i=0;i<90;i++){

const heart=document.createElement("div")
heart.className="heart"

heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.bottom="-20px"

heart.style.fontSize=(20+Math.random()*40)+"px"

let randomX=(Math.random()*200-100)+"vw"
heart.style.setProperty("--x",randomX)

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},4000)

}

}

function cakeClick(){

if(candleOut) return

clickCount++

if(clickCount===1){
showPopup("รักหมูฝ้ายที่สุดในโลก 💖")
}

else if(clickCount===2){
showPopup("ขอให้สุขภาพแข็งแรง ✨")
}

else if(clickCount===3){
showPopup("ขอให้รวยๆแล้วมาเลี้ยงเค้า >< 💸")
}

else if(clickCount===4){

document.getElementById("flame").style.display="none"

candleOut=true

createHearts()

}

}

</script>

</body>
</html>
